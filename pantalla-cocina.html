<script>
const FB_CFG={
  apiKey:"TU_API_KEY",
  authDomain:"TU_PROJECT.firebaseapp.com",
  databaseURL:"https://TU_PROJECT-default-rtdb.firebaseio.com",
  projectId:"TU_PROJECT"
};

let db=null, pedidos={}, anterior={};
let notifTimeout=null;

// ─── RELOJ ────────────────────────────────────────────────────────────
setInterval(()=>{
  document.getElementById('reloj').textContent=
    new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// ─── FIREBASE ─────────────────────────────────────────────────────────
function initFB(){
  try{
    if(typeof firebase==='undefined'){modoDemo();return;}
    if(!firebase.apps.length)firebase.initializeApp(FB_CFG);
    db=firebase.database();
    db.ref('.info/connected').on('value',s=>{
      const ok=s.val();
      document.getElementById('dot').className='dot'+(ok?'':' off');
      document.getElementById('conn').textContent=ok?'En línea':'Sin conexión';
    });
    db.ref('pedidos').on('value',snap=>{
      const nuevos=snap.val()||{};
      detectarNuevos(nuevos);
      detectarListos(nuevos);
      pedidos=nuevos; anterior={...nuevos};
      render();
    });
  }catch(e){modoDemo();}
}

function modoDemo(){
  document.getElementById('dot').className='dot';
  document.getElementById('conn').textContent='Demo';
  pedidos={
    d1:{cliente:'Pedro Soto',tipo:'cercano',direccion:'Av. Los Carrera 452',pago:'efectivo',
      items:[
        {nombre:'Pizza Mediana',qty:1,ings:['Tocino','Pepperoni','Champiñón'],extraIng:0},
        {nombre:'Bebida lata 350cc',qty:1,ings:[],extraIng:0}  // promo sin ingredientes
      ],
      notas:'',subtotal:11000,iva:2090,delivery:2000,total:15090,estado:'nuevo',hora:'19:30',timestamp:Date.now()-180000},
    d2:{cliente:'María González',tipo:'retiro',pago:'transferencia',
      items:[
        {nombre:'Hamburguesa Doble',qty:1,ings:['Queso cheddar','Tocino','Palta'],extraIng:0},
        {nombre:'Papas fritas',qty:1,ings:null,extraIng:0}  // promo con ings null
      ],
      notas:'Sin pepinillos',subtotal:11000,iva:2090,delivery:0,total:13090,estado:'prep',hora:'19:25',timestamp:Date.now()-360000},
    d3:{cliente:'Luis Pérez',tipo:'lejano',direccion:'Calle 5 Norte 221',pago:'efectivo',
      items:[
        {nombre:'2 Pizzas Medianas',qty:1,ings:undefined,extraIng:0}  // promo sin ings (undefined)
      ],
      notas:'',subtotal:16000,iva:3040,delivery:2500,total:21540,estado:'listo',hora:'19:10',timestamp:Date.now()-900000},
  };
  render();
}

// ─── DETECCIÓN DE EVENTOS ─────────────────────────────────────────────
function detectarNuevos(nuevos){
  Object.entries(nuevos).forEach(([id,p])=>{
    if(!anterior[id]&&p.estado==='nuevo') mostrarToast(p,'nuevo');
  });
}

function detectarListos(nuevos){
  Object.entries(nuevos).forEach(([id,p])=>{
    const ant=anterior[id];
    // Si acaba de pasar a "listo" desde otro estado → notificar delivery
    if(ant&&ant.estado!=='listo'&&p.estado==='listo'&&p.tipo!=='retiro'){
      notificarDelivery(p);
    }
  });
}

// ─── TOAST GENÉRICO ───────────────────────────────────────────────────
function mostrarToast(p, tipo){
  const el=document.getElementById('notif');
  el.className=''; // reset clases
  if(tipo==='nuevo'){
    document.getElementById('notif-icon').textContent='🍕';
    document.getElementById('notif-t').textContent='¡Nuevo pedido de '+p.cliente+'!';
    const itemsStr=(p.items||[]).map(i=>i.nombre).join(', ');
    document.getElementById('notif-b').textContent=
      (p.tipo==='retiro'?'🏠 Retiro':('📍 '+p.direccion))+'\n'+itemsStr;
    el.classList.add('show');
  } else if(tipo==='listo'){
    document.getElementById('notif-icon').textContent='✅';
    document.getElementById('notif-t').textContent='Pedido listo — '+p.cliente;
    document.getElementById('notif-b').textContent=
      '📍 Delivery a '+p.direccion+'\nAvisando al repartidor...';
    el.classList.add('show','delivery');
  }
  if(Notification.permission==='granted'){
    const titulo=tipo==='nuevo'?'🍕 Nuevo pedido — '+p.cliente:'✅ Pedido listo — '+p.cliente;
    const cuerpo=(p.items||[]).map(i=>i.nombre).join(', ');
    new Notification(titulo,{body:cuerpo});
  }
  clearTimeout(notifTimeout);
  notifTimeout=setTimeout(()=>el.classList.remove('show','delivery'),5500);
}

// ─── NOTIFICAR DELIVERY (cuando pedido pasa a "listo") ────────────────
function notificarDelivery(p){
  mostrarToast(p,'listo');
  // Si Firebase está activo: marcar campo "avisarDelivery" y timestamp
  if(db){
    db.ref('pedidos/'+p._id).update({
      avisarDelivery: true,
      listoEn: new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})
    });
  }
  // Aquí podrías llamar tu webhook / WhatsApp API / SMS
  // Ej: fetch('https://tu-api.com/notificar-delivery', {method:'POST', body:JSON.stringify(p)})
  console.log('[DELIVERY] Pedido listo para despacho:', p.cliente, p.direccion);
}

if(Notification.permission==='default') Notification.requestPermission();

// ─── RENDER ───────────────────────────────────────────────────────────
function render(){
  const cols={nuevo:[],prep:[],listo:[]};
  Object.entries(pedidos)
    .filter(([,p])=>p.estado!=='entregado')
    .sort(([,a],[,b])=>a.timestamp-b.timestamp)
    .forEach(([id,p])=>{
      p._id=id; // inyectar id para uso en notificarDelivery
      if(cols[p.estado]) cols[p.estado].push([id,p]);
    });
  document.getElementById('cnt-n').textContent=cols.nuevo.length;
  document.getElementById('cnt-p').textContent=cols.prep.length;
  document.getElementById('cnt-l').textContent=cols.listo.length;
  ['nuevo','prep','listo'].forEach(est=>{
    const colId=est==='prep'?'col-prep':'col-'+est;
    const col=document.getElementById(colId);
    const items=cols[est];
    col.innerHTML=items.length
      ? items.map(([id,p])=>renderCard(id,p)).join('')
      : '<div class="empty-col">Sin pedidos aquí</div>';
  });
}

// ─── RENDER CARD ──────────────────────────────────────────────────────
function renderCard(id,p){
  const mins=Math.floor((Date.now()-p.timestamp)/60000);
  const timerCls=mins>25?'timer urgent':'timer';
  const timerTxt=mins<1?'Hace un momento':Hace ${mins} min;

  // FIX: items sin ingredientes (promos) no fallan
  const itemsHTML=(p.items||[]).map(it=>{
    const ings=Array.isArray(it.ings)&&it.ings.length>0
      ? <div class="item-ings">${it.ings.join(', ')}</div>
      : '';
    const extra=it.extraIng>0
      ? <div class="item-extra">+ $${it.extraIng.toLocaleString('es-CL')} ingredientes extra</div>
      : '';
    return`<div class="item-row">
      <span class="item-qty">${it.qty||1}×</span>
      <div>
        <div class="item-name">${it.nombre}</div>
        ${ings}${extra}
      </div>
    </div>`;
  }).join('');

  // Botones según estado — más grandes y prominentes
  let acciones='';
  if(p.estado==='nuevo'){
    acciones=`
      <button class="btn-action btn-prep" onclick="cambiar('${id}','prep')">▶ Comenzar preparación</button>
      <div class="btn-row">
        <button class="btn-action btn-del" onclick="cambiar('${id}','entregado')">✕ Quitar</button>
      </div>`;
  } else if(p.estado==='prep'){
    acciones=`
      <button class="btn-action btn-listo" onclick="marcarListo('${id}')">✓ PEDIDO OK — LISTO</button>
      <div class="btn-row">
        <button class="btn-action btn-del" onclick="cambiar('${id}','entregado')">✕ Quitar</button>
      </div>`;
  } else if(p.estado==='listo'){
    acciones=`
      <button class="btn-action btn-entregado" onclick="cambiar('${id}','entregado')">🛵 Entregado al delivery</button>`;
  }

  const badgeDelivery=p.estado==='listo'&&p.tipo!=='retiro'
    ? <div class="badge-notif">📲 Delivery notificado</div>
    : '';

  return`<div class="card ${p.estado}" id="c-${id}">
    <div class="card-top">
      <span class="card-cliente">${p.cliente}</span>
      <span class="card-hora">${p.hora}</span>
    </div>
    <span class="card-tipo ${p.tipo==='retiro'?'tipo-retiro':'tipo-delivery'}">
      ${p.tipo==='retiro'?'🏠 Retiro':'📍 Delivery '+(p.tipo==='cercano'?'cercano':'lejano')}
    </span>
    <div class="card-pago">💳 ${p.pago==='efectivo'?'Efectivo':'Transferencia'}</div>
    <div class="items-list">${itemsHTML}</div>
    ${p.tipo!=='retiro'?<div class="card-dir">📍 ${p.direccion||''}</div>:''}
    ${p.notas?<div class="card-nota">💬 ${p.notas}</div>:''}
    <div class="card-total">$${p.subtotal.toLocaleString('es-CL')} + IVA $${p.iva.toLocaleString('es-CL')} + del. $${p.delivery.toLocaleString('es-CL')} = <strong>$${p.total.toLocaleString('es-CL')}</strong></div>
    <div class="${timerCls}">${timerTxt}</div>
    ${badgeDelivery}
    <div class="actions">${acciones}</div>
  </div>`;
}

// ─── CAMBIAR ESTADO ───────────────────────────────────────────────────
function cambiar(id,estado){
  if(db){
    const updates={estado};
    if(estado==='listo') updates.listoEn=new Date().toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'});
    db.ref('pedidos/'+id).update(updates);
  } else {
    if(pedidos[id]){pedidos[id].estado=estado; render();}
  }
}

// ─── MARCAR LISTO (con notificación delivery) ─────────────────────────
function marcarListo(id){
  const pedido=pedidos[id];
  // Notificar delivery si corresponde
  if(pedido&&pedido.tipo!=='retiro') notificarDelivery({...pedido, _id:id});
  cambiar(id,'listo');
}

// Refresh de timers cada minuto
setInterval(()=>{if(Object.keys(pedidos).length) render();},60000);

initFB();
</script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</body>
